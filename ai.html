<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Code Boost</title>
  <link rel="stylesheet" href="ai.css">
</head>
<body>

<!-- ① ファーストビュー -->
<section class="hero">
  <h1>未経験から3ヶ月で月5万円へ</h1>
  <p>大学生でもできるWebスキル習得</p>
  <button>無料で始める</button>
</section>

<!-- ② 悩み -->
<section class="problem">
  <h2>こんな悩みありませんか？</h2>
  <ul>
    <li>バイトの時給が低い</li>
    <li>将来が不安</li>
    <li>スキルがない</li>
  </ul>
</section>

<!-- ③ 問題深掘り -->
<section class="danger">
  <h2>そのままだと危険です</h2>
  <p>スキルがないままだと収入は上がりません</p>
</section>

<!-- ④ 解決策 -->
<section class="solution">
  <h2>でも安心してください</h2>
  <p>Code Boostなら未経験から学べます</p>
</section>

<!-- ⑤ ベネフィット -->
<section class="benefit">
  <h2>あなたの未来</h2>
  <ul>
    <li>在宅で稼げる</li>
    <li>スキルが身につく</li>
    <li>自由な生活</li>
  </ul>
</section>

<!-- ⑥ 信頼 -->
<section class="trust">
  <h2>実績</h2>
  <p>500人以上が受講</p>
</section>

<!-- ⑦ オファー -->
<section class="offer">
  <h2>今だけ無料体験ありがとう</h2>
</section>

<!-- ⑧ CTA -->
<section class="cta">
  <button>今すぐ申し込む</button>
</section>

</body>
</html>
